<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>宝の迷宮 - Treasure Labyrinth</title>
<meta name="description" content="なぞって すすむ ドットめいろ。息ぬきにも脳トレにも、完全オフラインで遊べる迷路ゲーム。">
<meta name="theme-color" content="#141628">
<meta property="og:title" content="宝の迷宮 - Treasure Labyrinth">
<meta property="og:description" content="なぞって すすむ ドットめいろ。介護と支援の相談どころ「そよぎ」提供。">
<meta property="og:image" content="https://treasure-labyrinth-web.vercel.app/icons/farcaster-embed.png">
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://treasure-labyrinth-web.vercel.app/icons/farcaster-embed.png","button":{"title":"🧭 あそぶ / Play","action":{"type":"launchMiniApp","name":"宝の迷宮","url":"https://treasure-labyrinth-web.vercel.app/","splashImageUrl":"https://treasure-labyrinth-web.vercel.app/icons/icon-192.png","splashBackgroundColor":"#141628"}}}'>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="appWrap">
  <div id="mainCol">
    <div id="hudTop" class="hidden">
      <div id="timeBox"><div id="timeNow">0:00.0</div><div id="timeTarget"></div></div>
      <div id="diffName"></div>
      <div class="camBtns">
        <button id="btnHint" title="ヒント" aria-label="ヒント">💡</button>
        <button id="btnZoomOut" title="ズームアウト">➖</button>
        <button id="btnZoomIn" title="ズームイン">➕</button>
        <button id="btnReset" title="してんリセット">🧭</button>
        <button id="btnQuit" title="やめる">✕</button>
      </div>
    </div>
    <div id="gameArea"><canvas id="cv"></canvas></div>
  </div>
  <div id="hudBottom" class="hidden">
    <div id="slots">
      <button class="slot" id="slotPick"><span class="sIco">⛏️<b id="cntPick">×0</b></span><small class="sLbl" id="lblPick">つるはし</small></button>
      <button class="slot" id="slotLadder"><span class="sIco">🪜<b id="cntLadder">×0</b></span><small class="sLbl" id="lblLadder">ハシゴ</small></button>
      <button class="slot" id="slotCoin"><span class="sIco">🪙<b id="cntCoin">×0</b></span><small class="sLbl" id="lblCoin">コイン</small></button>
      <button class="slot" id="slotDia"><span class="sIco">💎<b id="cntDia">×0</b></span><small class="sLbl" id="lblDia">ダイヤ</small></button>
      <button class="slot hidden" id="slotFist"><span class="sIco">💥<b id="cntFist">OK</b></span><small class="sLbl" id="lblFist">たいあたり</small></button>
      <button class="slot hidden" id="slotWarp"><span class="sIco">🌀<b id="cntWarp">OK</b></span><small class="sLbl" id="lblWarp">ワープ</small></button>
    </div>
    <div id="desc"></div>
    <div id="replayBar" class="hidden">
      <button id="btnRepPlay">⏸</button>
      <button id="btnRepRestart">↺</button>
      <button id="btnRepSpeed">×1</button>
      <span id="repTime">0:00.0 / 0:00.0</span>
    </div>
  </div>
</div>

<div id="title" class="overlay">
  <h1>宝の迷宮</h1>
  <p class="subEn">TREASURE LABYRINTH</p>
  <div id="masterBadge" class="hidden"><span class="mbTxt"></span></div>
  <p class="sub">なぞって すすむ ドットめいろ</p>
  <div id="charPick">
    <button id="pickBlue" class="charBtn"><canvas id="cvBlue" width="60" height="84"></canvas><span>あお</span></button>
    <button id="pickNeutral" class="charBtn"><canvas id="cvNeutral" width="60" height="84"></canvas><span>ロボ</span></button>
    <button id="pickRed" class="charBtn"><canvas id="cvRed" width="60" height="84"></canvas><span>あか</span></button>
  </div>
  <div id="lvBox">LV <span id="lvNum">1</span>
    <div id="expBar"><div id="expFill"></div></div>
    <div id="expTxt"></div>
    <div id="masteryBox" class="hidden"></div>
    <div id="passiveNow"></div>
  </div>
  <button id="btnStart" class="big">▶ はじめる</button>
  <button id="btnResume" class="hidden">▶ つづきから</button>
  <button id="btnReplay">▶ リプレイ</button>
  <div class="row"><button id="btnSkill">⚙ スキル</button><button id="btnLang">🌐</button><button id="btnSet">🔧</button></div>
  <p class="credit">アプリ開発・介護と支援の相談どころ<a href="https://soyogi.hp.peraichi.com/top" target="_blank" rel="noopener">「そよぎ」</a></p>
</div>

<div id="langSel" class="overlay hidden">
  <h2>ことばを えらぶ</h2>
  <div id="langList"></div>
  <button id="btnBackTitle3">← タイトルへ</button>
</div>

<div id="setSel" class="overlay hidden">
  <h2>🔧 せってい</h2>
  <div class="setRow"><div class="setLbl" id="fsLabel"></div><div id="fontBtns" class="row"></div></div>
  <div class="setRow"><div class="setLbl" id="bgmLabel"></div><div class="volRow"><input type="range" id="volBgmR" min="0" max="3" step="0.25"><span class="volV" id="volBgmV"></span></div></div>
  <div class="setRow"><div class="setLbl" id="sfxLabel"></div><div class="volRow"><input type="range" id="volSfxR" min="0" max="3" step="0.25"><span class="volV" id="volSfxV"></span></div></div>
  <div class="setRow"><div class="setLbl" id="vibeLabel"></div><div class="row"><button id="vibeToggle" class="langBtn">OFF</button></div></div>
  <button id="btnBackTitle4">← タイトルへ</button>
</div>

<div id="congrats" class="hidden">
  <div id="congratsMain">🎉 CONGRATULATIONS!! 🎉</div>
  <div id="congratsSub"></div>
</div>

<div id="diffSel" class="overlay hidden">
  <h2>めいろを えらぶ</h2>
  <div id="diffList"></div>
  <div id="zukanBox"></div>
  <button id="btnBackTitle">← タイトルへ</button>
</div>

<div id="skillSel" class="overlay hidden">
  <h2>パッシブスキル</h2>
  <p id="skillNote"></p>
  <div id="skillCards"></div>
  <div id="skillList"></div>
  <button id="btnBackTitle2">← タイトルへ</button>
</div>

<div id="clearOv" class="overlay hidden">
  <h2 id="clearTitle"></h2>
  <div id="clearBody"></div>
  <button id="btnSaveReplay" class="hidden">リプレイ保存</button>
  <div class="row"><button id="btnRetry">もういちど</button><button id="btnNext" class="big">つぎへ ▶</button></div>
</div>

<div id="replaySel" class="overlay hidden">
  <h2 id="replayTitle">▶ リプレイ</h2>
  <div id="replayList"></div>
  <button id="btnBackTitle5">← タイトルへ</button>
</div>

<div id="toast"></div>
<div id="lvup"></div>
<div id="stagename"></div>

<script src="i18n.js"></script>
<script src="logic.js"></script>
<script src="audio.js"></script>
<script src="game.js"></script>
<script>
if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
  // A-7 新版が有効になっても即リロードせず、安全な画面（タイトル/難易度選択）到達時に game.js が1回だけリロードする
  const hadController = !!navigator.serviceWorker.controller; // 初回インストール時のムダなリロードは避ける
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadController) return;
    window.__swReloadPending = true; // プレイ中は発火させず、フラグだけ立てる
  });
  addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.update(); // 起動のたびに新版チェック
      addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') reg.update(); });
    }).catch(() => {});
  });
}
</script>
<script type="module">
/* Farcaster Mini App: フレーム内で開かれた時に ready() を送る */
try {
  const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
  await sdk.actions.ready();
} catch (e) { /* 通常ブラウザでは何もしない */ }
</script>
</body>
</html>
